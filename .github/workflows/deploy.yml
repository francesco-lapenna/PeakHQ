name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write # Required for OIDC authentication to AWS
  contents: read

env:
  AWS_REGION: eu-south-1

jobs:
  deploy:
    name: Test, Deploy CDK, Sync Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit & integration tests
        run: npm test

      - name: CDK snapshot tests
        run: npm run test:infra

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK deploy
        run: npx cdk deploy --all --require-approval never --outputs-file ../cdk-outputs.json
        working-directory: infra

      - name: Parse CDK outputs
        id: cdk
        run: |
          CF_DOMAIN=$(jq -r '.PeakHQFrontendStack.DistributionDomainName' cdk-outputs.json)
          echo "CF_DOMAIN=$CF_DOMAIN"           >> "$GITHUB_ENV"
          echo "CF_DISTRIBUTION_ID=$(jq -r '.PeakHQFrontendStack.DistributionId'   cdk-outputs.json)" >> "$GITHUB_ENV"
          echo "S3_BUCKET=$(jq -r             '.PeakHQFrontendStack.BucketName'     cdk-outputs.json)" >> "$GITHUB_ENV"
          echo "COGNITO_CLIENT_ID=$(jq -r     '.PeakHQAuthStack.UserPoolClientId'   cdk-outputs.json)" >> "$GITHUB_ENV"
          echo "COGNITO_DOMAIN=$(jq -r        '.PeakHQAuthStack.CognitoDomain'      cdk-outputs.json)" >> "$GITHUB_ENV"

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_COGNITO_DOMAIN: ${{ env.COGNITO_DOMAIN }}
          VITE_COGNITO_CLIENT_ID: ${{ env.COGNITO_CLIENT_ID }}
          VITE_COGNITO_REDIRECT_URI: https://${{ env.CF_DOMAIN }}/auth/callback
          VITE_API_BASE_URL: https://${{ env.CF_DOMAIN }}/api

      - name: Sync frontend to S3
        run: |
          # Hashed assets (JS/CSS bundles) — long-lived cache, content-addressed filenames
          aws s3 sync frontend/dist/ s3://${{ env.S3_BUCKET }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"
          # index.html must never be cached so browsers pick up new deployments immediately
          aws s3 cp frontend/dist/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CF_DISTRIBUTION_ID }} \
            --paths "/*"
